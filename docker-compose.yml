services:
  app:
    build: .
    container_name: fd-commander-app
    ports:
      - "${APP_PORT:-80}:80"
    env_file: .env
    environment:
      # Override values for Docker networking — must match the mysql service
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE:-fd_commander}"
      DB_USERNAME: "${DB_USERNAME:-fd_commander}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REVERB_SERVER_HOST: "0.0.0.0"
    volumes:
      - app-storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: fd-commander-mysql
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-fd_commander}"
      MYSQL_USER: "${DB_USERNAME:-fd_commander}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Uncomment to add Redis for caching/broadcasting
  # redis:
  #   image: redis:7-alpine
  #   container_name: fd-commander-redis
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  app-storage:
  mysql-data:
  # redis-data:
