services:
  app:
    build: .
    container_name: fd-commander-app
    ports:
      - "${APP_PORT:-80}:80"
      # External logger UDP ports — these allow logging programs on the local
      # network (N1MM Logger+, WSJT-X, fldigi, etc.) to send contacts into the
      # container. The host-side port (left of the colon) can be changed via
      # env vars in .env; the container-side port (right) must match the port
      # configured in the FD Commander admin UI (Settings > External Loggers).
      - "${N1MM_PORT:-12060}:${N1MM_PORT:-12060}/udp"       # N1MM Logger+
      - "${WSJTX_PORT:-2237}:${WSJTX_PORT:-2237}/udp"       # WSJT-X / JTDX
      - "${UDP_ADIF_PORT:-2238}:${UDP_ADIF_PORT:-2238}/udp" # Plain UDP ADIF (fldigi, etc.)
    env_file: .env
    environment:
      # Override values for Docker networking — must match the mysql service
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE:-fd_commander}"
      DB_USERNAME: "${DB_USERNAME:-fd_commander}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REVERB_SERVER_HOST: "0.0.0.0"
      # Redis drivers — contact logs fsync to disk every write (AOF always),
      # everything else caches aggressively in RAM.
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_CACHE_DB: "1"
    volumes:
      - app-storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: fd-commander-mysql
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-fd_commander}"
      MYSQL_USER: "${DB_USERNAME:-fd_commander}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fd-commander-redis
    # AOF with appendfsync=always fsyncs every Redis write, so queue jobs
    # survive a power cut. (Contacts go straight to the DB, not through Redis.)
    # Heavy RAM cache with volatile-lru eviction keeps queue/session keys in
    # place and only evicts TTL'd cache entries when maxmemory is reached.
    # REDIS_MAXMEMORY is sized by docker/setup.sh based on host RAM (Pi-friendly).
    command: >-
      redis-server
      --appendonly yes
      --appendfsync always
      --no-appendfsync-on-rewrite no
      --aof-use-rdb-preamble yes
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy volatile-lru
      --tcp-keepalive 60
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  app-storage:
  mysql-data:
  redis-data:
